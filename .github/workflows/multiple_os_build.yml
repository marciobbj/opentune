name: Multi-Platform Build
on:
  push:
    branches: ["main"]
    tags:
      - 'v*' # Executa apenas em tags de versão para evitar releases em cada commit

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android-linux
            os: ubuntu-latest
            build_cmd: |
              sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
              export PATH="$FLUTTER_ROOT/bin:$PATH"
              flutter build apk --release
              flutter build linux --release
              zip -rj linux-release.zip build/linux/x64/release/bundle/
            artifacts: "build/app/outputs/flutter-apk/*.apk,linux-release.zip"
          
          - target: windows
            os: windows-latest
            build_cmd: |
              flutter build windows --release
              powershell Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath windows-release.zip -Force
            artifacts: "windows-release.zip"

          - target: macos
            os: macos-latest
            build_cmd: |
              flutter build macos --release
              zip -r macos-release.zip build/macos/Build/Products/Release/*.app
            artifacts: "macos-release.zip"

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        if: matrix.target == 'android-linux'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Platform
        run: ${{ matrix.build_cmd }}

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ${{ matrix.artifacts }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: false
          tag: ${{ github.ref_name }}
